<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strange Ground — a field guide to the eerie nearby</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0c100e;
    --ink-raised:#141a16;
    --ink-panel:#10150f;
    --bone:#e8e2d0;
    --bone-dim:#9aa093;
    --bone-faint:#6b7167;
    --hair:rgba(232,226,208,0.13);
    --hair-strong:rgba(232,226,208,0.28);
    --marsh:#a8c24a;     /* folklore / hauntings */
    --rust:#c2603f;      /* crime / macabre */
    --amber:#e0a04a;     /* war / conflict */
    --slate:#7d97ad;     /* ruins / abandoned */
    --ochre:#cba14a;     /* ancient / sacred */
    --lichen:#9fb18a;    /* graves / tombs */
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--ink);
    color:var(--bone);
    font-family:'Spectral',Georgia,serif;
    font-weight:300;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  /* ---- masthead ---- */
  header{
    border-bottom:1px solid var(--hair-strong);
    padding:14px 22px 12px;
    display:flex;align-items:baseline;gap:18px;flex-wrap:wrap;
    background:linear-gradient(180deg,#0e130f,var(--ink));
  }
  .mast h1{
    font-family:'IM Fell English',serif;
    font-weight:400;font-size:30px;line-height:1;margin:0;
    letter-spacing:.5px;
  }
  .mast h1 .amp{color:var(--marsh)}
  .mast .sub{
    font-family:'Space Mono',monospace;
    font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--bone-faint);margin-top:6px;
  }
  .readout{
    margin-left:auto;
    font-family:'Space Mono',monospace;
    font-size:11px;color:var(--bone-dim);text-align:right;line-height:1.7;
    white-space:nowrap;
  }
  .readout b{color:var(--marsh);font-weight:700}
  /* ---- control bar ---- */
  .controls{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    padding:12px 22px;border-bottom:1px solid var(--hair);
    background:var(--ink-panel);
  }
  .field{position:relative;flex:1;min-width:200px}
  .field input{
    width:100%;background:#0a0e0a;border:1px solid var(--hair-strong);
    color:var(--bone);font-family:'Spectral',serif;font-size:15px;
    padding:9px 12px;border-radius:2px;outline:none;
  }
  .field input::placeholder{color:var(--bone-faint)}
  .field input:focus{border-color:var(--marsh)}
  button.act{
    background:transparent;border:1px solid var(--hair-strong);color:var(--bone);
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;
    text-transform:uppercase;padding:9px 14px;border-radius:2px;cursor:pointer;
    transition:.15s;white-space:nowrap;
  }
  button.act:hover{border-color:var(--marsh);color:var(--marsh)}
  button.act.primary{border-color:var(--marsh);color:var(--marsh)}
  button.act.primary:hover{background:var(--marsh);color:var(--ink)}
  select.radius{
    background:#0a0e0a;border:1px solid var(--hair-strong);color:var(--bone);
    font-family:'Space Mono',monospace;font-size:11px;padding:9px 8px;border-radius:2px;
    text-transform:uppercase;letter-spacing:1px;cursor:pointer;
  }
  .ctl-label{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--bone-faint);margin-left:4px;
  }
  /* ---- layout ---- */
  main{display:flex;height:calc(100vh - 132px)}
  aside{
    width:380px;flex-shrink:0;border-right:1px solid var(--hair-strong);
    display:flex;flex-direction:column;background:var(--ink-panel);
  }
  #map{flex:1;background:var(--ink);z-index:0}
  /* ---- filters / key ---- */
  .key{padding:13px 16px 10px;border-bottom:1px solid var(--hair)}
  .key-label{
    font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:2px;
    text-transform:uppercase;color:var(--bone-faint);margin-bottom:9px;
  }
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    border:1px solid var(--hair);border-radius:2px;padding:4px 8px 4px 6px;
    font-size:12px;color:var(--bone-dim);transition:.12s;user-select:none;
  }
  .chip .sig{width:15px;height:15px;flex-shrink:0}
  .chip.off{opacity:.32;filter:grayscale(.7)}
  .chip:hover{border-color:var(--hair-strong);color:var(--bone)}
  .chip .ct{font-family:'Space Mono',monospace;font-size:9.5px;color:var(--bone-faint)}
  /* ---- list ---- */
  .list-head{
    padding:11px 16px 9px;display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid var(--hair);
  }
  .list-head .title{font-family:'IM Fell English',serif;font-size:16px;letter-spacing:.3px}
  .list-head .count{font-family:'Space Mono',monospace;font-size:10px;color:var(--bone-faint);letter-spacing:1px}
  .entries{overflow-y:auto;flex:1}
  .entries::-webkit-scrollbar{width:9px}
  .entries::-webkit-scrollbar-thumb{background:#2a322a;border-radius:0}
  .entries::-webkit-scrollbar-track{background:transparent}
  .entry{
    display:flex;gap:11px;padding:13px 16px;border-bottom:1px solid var(--hair);
    cursor:pointer;transition:background .12s;
  }
  .entry:hover{background:rgba(168,194,74,0.06)}
  .entry .sig{width:22px;height:22px;flex-shrink:0;margin-top:2px}
  .entry .body{min-width:0;flex:1}
  .entry .nm{font-size:15.5px;color:var(--bone);line-height:1.25;margin-bottom:2px}
  .entry .meta{
    font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:1px;
    text-transform:uppercase;color:var(--bone-faint);margin-bottom:5px;
    display:flex;gap:8px;align-items:center;
  }
  .entry .meta .cat{color:var(--bone-dim)}
  .entry .ex{font-size:12.5px;line-height:1.45;color:var(--bone-dim);
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  /* ---- status / empty ---- */
  .status{
    padding:22px 18px;font-size:13px;color:var(--bone-dim);line-height:1.6;text-align:center;
  }
  .status .spin{
    width:26px;height:26px;border:2px solid var(--hair);border-top-color:var(--marsh);
    border-radius:50%;margin:0 auto 14px;animation:sp 1s linear infinite;
  }
  @keyframes sp{to{transform:rotate(360deg)}}
  .status code{font-family:'Space Mono',monospace;color:var(--amber);font-size:11px}
  /* ---- map markers ---- */
  .pin{
    width:30px;height:30px;border-radius:50%;
    background:#10150f;border:1.5px solid currentColor;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 0 3px rgba(12,16,14,.7), 0 2px 6px rgba(0,0,0,.5);
  }
  .pin svg{width:17px;height:17px}
  .pin.faded{opacity:0}
  /* ---- leaflet dark popups ---- */
  .leaflet-popup-content-wrapper{
    background:var(--ink-raised);color:var(--bone);border:1px solid var(--hair-strong);
    border-radius:3px;box-shadow:0 8px 30px rgba(0,0,0,.6);
  }
  .leaflet-popup-tip{background:var(--ink-raised);border:1px solid var(--hair-strong)}
  .leaflet-popup-content{margin:13px 15px;font-family:'Spectral',serif;width:248px!important}
  .pop .pnm{font-family:'IM Fell English',serif;font-size:18px;line-height:1.15;margin-bottom:5px}
  .pop .pmeta{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--bone-faint);margin-bottom:8px}
  .pop .pex{font-size:13px;line-height:1.5;color:var(--bone-dim);margin-bottom:9px;
    max-height:160px;overflow-y:auto}
  .pop a{color:var(--marsh);font-family:'Space Mono',monospace;font-size:10px;
    letter-spacing:1px;text-transform:uppercase;text-decoration:none;border-bottom:1px solid var(--marsh)}
  .pop img{width:100%;border-radius:2px;margin-bottom:9px;filter:saturate(.8) contrast(1.05)}
  .leaflet-container{background:var(--ink)!important}
  .leaflet-control-attribution{background:rgba(12,16,14,.8)!important;color:#6b7167!important}
  .leaflet-control-attribution a{color:#9aa093!important}
  .leaflet-bar a{background:var(--ink-raised)!important;color:var(--bone)!important;border-color:var(--hair)!important}
  /* ---- responsive ---- */
  @media(max-width:820px){
    main{flex-direction:column;height:auto;overflow-y:auto}
    aside{width:100%;border-right:none;border-bottom:1px solid var(--hair-strong);order:2;max-height:none}
    #map{order:1;height:46vh;min-height:300px;flex:none}
    .entries{max-height:none;overflow:visible}
    body{overflow:auto}
    .readout{display:none}
  }
</style>
</head>
<body>
<header>
  <div class="mast">
    <h1>Strange Ground</h1>
    <div class="sub">a field guide to the eerie &amp; historical ground nearby</div>
  </div>
  <div class="readout" id="readout">awaiting survey</div>
</header>

<div class="controls">
  <button class="act primary" id="locate">Use my location</button>
  <span class="ctl-label">Look within</span>
  <select class="radius" id="radius">
    <option value="2000">2 km</option>
    <option value="5000" selected>5 km</option>
    <option value="10000">10 km</option>
  </select>
</div>

<main>
  <aside>
    <div class="key">
      <div class="key-label">The Key — tap to filter</div>
      <div class="chips" id="chips"></div>
    </div>
    <div class="list-head">
      <span class="title">Field notes</span>
      <span class="count" id="count">—</span>
    </div>
    <div class="entries" id="entries">
      <div class="status">Surveying the ground for the first time…</div>
    </div>
  </aside>
  <div id="map"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ------------------------------------------------------------------ */
/*  CATEGORIES — each with an evocative sigil drawn as inline SVG       */
/* ------------------------------------------------------------------ */
const CATS = {
  folklore: { label:'Folklore & Hauntings', color:'var(--marsh)', hex:'#a8c24a',
    glyph:'<path d="M12 3c0 4-4 5-4 9a4 4 0 0 0 8 0c0-2-1.5-3-2-5-1 1.5-2 1-2-1z" fill="currentColor"/>' },
  crime: { label:'Crime & the Macabre', color:'var(--rust)', hex:'#c2603f',
    glyph:'<path d="M12 2v13M9 6l3-3 3 3M9 18h6M10 22h4" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>' },
  war: { label:'War & Conflict', color:'var(--amber)', hex:'#e0a04a',
    glyph:'<path d="M5 5l9 9M14 5l-9 9M4 18l3 0M17 18l3 0M11 16l2 2" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>' },
  ruins: { label:'Ruins & Abandoned', color:'var(--slate)', hex:'#7d97ad',
    glyph:'<path d="M4 21V9l3-2 3 2v4M14 21V6l3-2 3 2v15M4 21h16M9 13l5-3" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>' },
  ancient: { label:'Ancient & Sacred', color:'var(--ochre)', hex:'#cba14a',
    glyph:'<path d="M5 20V8h3v12M16 20V8h3v12M5 8h14v-2H5zM10.5 20v-8h3v8" stroke="currentColor" stroke-width="1.3" fill="none"/>' },
  graves: { label:'Graves & Tombs', color:'var(--lichen)', hex:'#9fb18a',
    glyph:'<path d="M7 21V9a5 5 0 0 1 10 0v12M7 21h10M10 8v4M12 6v6" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>' },
  history: { label:'Monuments & History', color:'var(--bone)', hex:'#e8e2d0',
    glyph:'<path d="M12 2l2 4-2 1-2-1zM11 7h2v11h-2zM7 21h10M9 18h6" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>' }
};
function sigSvg(key, size){
  const c = CATS[key];
  return `<svg class="sig" viewBox="0 0 24 24" style="color:${c.color};width:${size}px;height:${size}px">${c.glyph}</svg>`;
}

/* ------------------------------------------------------------------ */
/*  KEYWORD CATEGORISATION (for Wikipedia text)                        */
/* ------------------------------------------------------------------ */
const KW = {
  crime:   ['murder','murdered','killing','killed','hanged','gallows','gibbet','execution','executed','manslaughter','massacre','witch trial','witches','poisoner','strangl','stabbed','body was found','serial'],
  folklore:['ghost','haunt','legend','myth','folklore','spectre','specter','apparition','fairy','faerie','boggart','will-o','devil','curse','phantom','poltergeist','banshee','wraith','hellhound','black dog','barghest'],
  war:     ['world war','first world war','second world war','ww1','ww2','wwii','war memorial','cenotaph','raf ','airfield','aerodrome','bunker','pillbox','blitz','bombing','luftwaffe','regiment','battalion','prisoner of war','home guard','anti-aircraft','battle of','battlefield','battery'],
  ancient: ['stone circle','standing stone','megalith','barrow','tumulus','tumuli','henge','cairn','hillfort','hill fort','iron age','bronze age','neolithic','roman ','romano','holy well','hermitage','earthwork','motte','dolmen','cup and ring'],
  graves:  ['grave','tomb','cemetery','churchyard','mausoleum','burial','crypt','sepulchre','sepulcher','catacomb','vault','interred','buried here'],
  ruins:   ['ruin','ruined','ruins','abandoned','derelict','deserted','dissolved','dissolution']
};
function categorise(text){
  const t = text.toLowerCase();
  for(const k of ['crime','war','folklore','ancient','graves','ruins']){
    if(KW[k].some(w => t.includes(w))) return k;
  }
  return 'history';
}

/* Wikipedia FILTERING by article CATEGORY — this is what keeps "things to see"
   (a specific castle, church, monument, barrow) and throws out "things to read
   about" (a village, town, parish, suburb). */
const STRUCT_CAT = /(listed buildings|castles|country houses|manor houses|churches|chapels|abbeys|priories|monasteries|friaries|cathedrals|minsters|ruins|scheduled monuments|monuments and memorials|war memorials|memorials in|cenotaphs|archaeological sites|stone circles|standing stones|megalith|hill ?forts|barrows|tumuli|cairns|henges|holy wells|towers in|windmills|watermills|follies|bridges in|museums in|cemeteries|mausolea|mausoleums|tombs|battlefields|battles of|sieges of|statues|sculptures in|lighthouses|reportedly haunted|hauntings|murders in|roman sites|roman villas|priory|country parks|deserted medieval villages|crosses in|gardens in)/i;
const SETTLE_CAT = /(villages in|hamlets in|towns in|market towns|civil parishes|former civil parishes|populated places|suburbs of|areas of|districts of|unparished areas|electoral wards|wards of|townships in|geography of|former settlements|localities)/i;

/* narrow "this is a specific notable mystery" set — rescues intangible sites
   (a murder, a battle, a legend) that have no structure category */
const MYST = [].concat(KW.crime, KW.folklore, KW.war, KW.ancient, KW.graves, KW.ruins);
function strongMystery(t){ t=t.toLowerCase(); return MYST.some(w => t.includes(w)); }

/* decide whether a Wikipedia article is a place worth visiting */
function keepWiki(catsBlob, textBlob){
  if(STRUCT_CAT.test(catsBlob)) return true;     // it's a structure / heritage site
  if(SETTLE_CAT.test(catsBlob)) return false;    // it's a settlement / admin area — drop
  return strongMystery(textBlob);                // else keep only if it's a specific mystery
}

/* ------------------------------------------------------------------ */
/*  OSM TAG → CATEGORY                                                 */
/* ------------------------------------------------------------------ */
function categoriseOSM(tags){
  const h = tags.historic||'', m = tags.military||'', mm = tags.man_made||'';
  if(m || h==='battlefield' || tags.memorial==='war_memorial' || /war/.test((tags.name||'').toLowerCase())) return 'war';
  if(h==='tomb' || tags.landuse==='cemetery' || tags.amenity==='grave_yard') return 'graves';
  if(['archaeological_site','megalith','standing_stone','stone','tumulus','cairn','hillfort','tomb','rune_stone'].includes(h) || tags.site_type==='megalith') return 'ancient';
  if(tags.ruins==='yes' || ['ruins','castle','manor','fort','city_gate'].includes(h)) return 'ruins';
  if(['memorial','monument','cross','wayside_cross','obelisk','cenotaph'].includes(h)) return 'history';
  if(['windmill','watermill','lighthouse','obelisk'].includes(mm)) return 'history';
  if(tags.heritage){                                   // listed/heritage building
    const use = (tags.building||'')+' '+(tags.amenity||'');
    if(/church|chapel|cathedral|abbey|priory|minster|place_of_worship/.test(use)) return 'ancient';
    return 'history';
  }
  return 'history';
}
function osmLabel(tags){
  if(tags.name) return tags.name;
  const h = tags.historic, m = tags.military, mm = tags.man_made;
  const nice = {
    pillbox:'Pillbox', bunker:'Bunker', memorial:'War memorial', ruins:'Ruins', castle:'Castle (remains)',
    archaeological_site:'Archaeological site', tomb:'Tomb', monument:'Monument', cross:'Old cross',
    wayside_cross:'Wayside cross', boundary_stone:'Boundary stone', battlefield:'Battlefield',
    standing_stone:'Standing stone', cairn:'Cairn', tumulus:'Barrow / tumulus', city_gate:'Old city gate',
    windmill:'Windmill', watermill:'Watermill', lighthouse:'Lighthouse', obelisk:'Obelisk'
  };
  if(nice[h]) return nice[h];
  if(nice[m]) return nice[m];
  if(nice[mm]) return nice[mm];
  if(tags.ruins==='yes') return 'Ruins';
  if(tags.heritage){
    const b = (tags.building||'').replace(/_/g,' ');
    return b && b!=='yes' ? b.charAt(0).toUpperCase()+b.slice(1) : 'Listed building';
  }
  return h ? h.replace(/_/g,' ') : 'Historic feature';
}

/* ------------------------------------------------------------------ */
/*  STATE + MAP                                                        */
/* ------------------------------------------------------------------ */
const DEFAULT = [53.4302, -1.3568]; // Rotherham area — change by searching anywhere
const state = { lat:DEFAULT[0], lon:DEFAULT[1], radius:5000, results:[], active:new Set(Object.keys(CATS)), markers:{} };

const map = L.map('map',{zoomControl:true,attributionControl:true}).setView(DEFAULT,13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO · data: Wikipedia + OSM',
  subdomains:'abcd', maxZoom:19
}).addTo(map);
const layer = L.layerGroup().addTo(map);
let centreMark = null;

/* ------------------------------------------------------------------ */
/*  GEO HELPERS                                                        */
/* ------------------------------------------------------------------ */
function hav(la1,lo1,la2,lo2){
  const R=6371000, t=Math.PI/180;
  const dLa=(la2-la1)*t, dLo=(lo2-lo1)*t;
  const a=Math.sin(dLa/2)**2 + Math.cos(la1*t)*Math.cos(la2*t)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
const norm = s => (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\b(the|of|st|saint|a)\b/g,'').replace(/\s+/g,' ').trim();
const fmtDist = m => m<1000 ? Math.round(m)+' m' : (m/1000).toFixed(1)+' km';

/* ------------------------------------------------------------------ */
/*  DATA SOURCES                                                       */
/* ------------------------------------------------------------------ */
async function fetchWiki(lat,lon,radius){
  const gs = `https://en.wikipedia.org/w/api.php?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=${Math.min(radius,10000)}&gslimit=80&format=json&origin=*`;
  const r = await fetch(gs); const d = await r.json();
  const hits = (d.query && d.query.geosearch) || [];
  if(!hits.length) return [];
  const ids = hits.map(h=>h.pageid).slice(0,50).join('|');
  const ex = `https://en.wikipedia.org/w/api.php?action=query&prop=extracts|pageimages|categories&exintro=1&explaintext=1&piprop=thumbnail&pithumbsize=260&clshow=!hidden&cllimit=80&pageids=${ids}&format=json&origin=*`;
  const r2 = await fetch(ex); const d2 = await r2.json();
  const pages = (d2.query && d2.query.pages) || {};
  const out=[];
  for(const h of hits){
    const p = pages[h.pageid]; if(!p) continue;
    const extract = p.extract || '';
    const cats = (p.categories||[]).map(c=>c.title.replace(/^Category:/,'')).join(' | ');
    const blob = h.title + ' ' + extract;
    if(!keepWiki(cats, blob)) continue;          // keep "things to see", drop settlements
    out.push({
      src:'wiki', id:'w'+h.pageid, name:h.title, lat:h.lat, lon:h.lon,
      dist:h.dist, cat:categorise(cats+' '+blob), extract,
      thumb: p.thumbnail ? p.thumbnail.source : null,
      url: 'https://en.wikipedia.org/?curid='+h.pageid
    });
  }
  return out;
}

async function fetchOverpass(lat,lon,radius){
  const q = `[out:json][timeout:25];(
    nwr(around:${radius},${lat},${lon})["historic"];
    nwr(around:${radius},${lat},${lon})["heritage"];
    nwr(around:${radius},${lat},${lon})["military"~"bunker|pillbox|trench"];
    nwr(around:${radius},${lat},${lon})["memorial"];
    nwr(around:${radius},${lat},${lon})["man_made"~"obelisk|lighthouse|windmill|watermill"];
    nwr(around:${radius},${lat},${lon})["ruins"="yes"];
    nwr(around:${radius},${lat},${lon})["landuse"="cemetery"];
    nwr(around:${radius},${lat},${lon})["amenity"="grave_yard"];
  );out center tags 400;`;
  const r = await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q)});
  if(!r.ok) throw new Error('overpass '+r.status);
  const d = await r.json();
  const out=[];
  for(const e of (d.elements||[])){
    const la = e.lat ?? (e.center&&e.center.lat), lo = e.lon ?? (e.center&&e.center.lon);
    if(la==null||lo==null) continue;
    const tags = e.tags||{};
    const onTheme = tags.historic||tags.heritage||tags.military||tags.memorial||
                    /obelisk|lighthouse|windmill|watermill/.test(tags.man_made||'')||
                    tags.ruins==='yes'||tags.landuse==='cemetery'||tags.amenity==='grave_yard';
    if(!onTheme) continue;
    out.push({
      src:'osm', id:'o'+e.type+e.id, name:osmLabel(tags), lat:la, lon:lo,
      dist:hav(lat,lon,la,lo), cat:categoriseOSM(tags), extract:'',
      thumb:null, named:!!tags.name,
      url:`https://www.openstreetmap.org/${e.type}/${e.id}`
    });
  }
  return out;
}

/* ------------------------------------------------------------------ */
/*  SURVEY (the main fetch + merge)                                    */
/* ------------------------------------------------------------------ */
async function survey(lat,lon,radius,placeName){
  state.lat=lat; state.lon=lon; state.radius=radius;
  document.getElementById('readout').innerHTML =
    `<b>surveying…</b><br>${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  document.getElementById('entries').innerHTML =
    '<div class="status"><div class="spin"></div>Reading the ground within '+(radius/1000)+' km…</div>';
  map.setView([lat,lon], radius<=2000?14:radius<=5000?13:12);
  if(centreMark) map.removeLayer(centreMark);
  centreMark = L.circle([lat,lon],{radius:18,color:'#a8c24a',fillColor:'#a8c24a',fillOpacity:.9,weight:0}).addTo(map);

  const [wikiR, osmR] = await Promise.allSettled([
    fetchWiki(lat,lon,radius), fetchOverpass(lat,lon,radius)
  ]);
  const wiki = wikiR.status==='fulfilled' ? wikiR.value : [];
  const osm  = osmR.status==='fulfilled'  ? osmR.value  : [];
  const errs=[];
  if(wikiR.status==='rejected') errs.push('Wikipedia');
  if(osmR.status==='rejected')  errs.push('OpenStreetMap');

  // dedup: drop OSM features that match a Wikipedia entry by name+proximity
  const wikiIndex = wiki.map(w=>({n:norm(w.name),lat:w.lat,lon:w.lon}));
  const merged = [...wiki];
  for(const o of osm){
    const n = norm(o.name);
    const dupe = o.named && wikiIndex.some(w => w.n && w.n===n && hav(w.lat,w.lon,o.lat,o.lon)<350);
    if(!dupe) merged.push(o);
  }
  merged.sort((a,b)=>a.dist-b.dist);
  state.results = merged.slice(0,160);

  const place = placeName ? placeName : `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
  document.getElementById('readout').innerHTML =
    `<b>${state.results.length} sites</b> within ${radius/1000} km<br>${place}`;
  render();
  if(errs.length){
    document.getElementById('entries').insertAdjacentHTML('afterbegin',
      `<div class="status" style="padding:10px 16px;border-bottom:1px solid var(--hair)"><code>${errs.join(' & ')} did not answer — showing what came back. Try again in a moment.</code></div>`);
  }
}

/* ------------------------------------------------------------------ */
/*  RENDER                                                             */
/* ------------------------------------------------------------------ */
function render(){
  // chips
  const chips = document.getElementById('chips');
  const counts = {}; state.results.forEach(r=>counts[r.cat]=(counts[r.cat]||0)+1);
  chips.innerHTML = Object.keys(CATS).map(k=>{
    const off = state.active.has(k) ? '' : ' off';
    const n = counts[k]||0;
    return `<span class="chip${off}" data-cat="${k}">${sigSvg(k,15)}<span>${CATS[k].label.split(' ')[0]}</span><span class="ct">${n}</span></span>`;
  }).join('');
  chips.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    const k=c.dataset.cat;
    state.active.has(k)?state.active.delete(k):state.active.add(k);
    render();
  });

  const shown = state.results.filter(r=>state.active.has(r.cat));
  document.getElementById('count').textContent = shown.length+' shown';

  // list
  const el = document.getElementById('entries');
  if(!shown.length){
    el.innerHTML = '<div class="status">Nothing within this radius matches the active filters.<br>Widen the radius, survey a new place, or switch a sigil back on.</div>';
  } else {
    el.innerHTML = shown.map(r=>{
      const ex = r.extract ? `<div class="ex">${esc(r.extract)}</div>` : `<div class="ex" style="opacity:.6">Mapped feature from OpenStreetMap — no description on file.</div>`;
      return `<div class="entry" data-id="${r.id}">
        ${sigSvg(r.cat,22)}
        <div class="body">
          <div class="nm">${esc(r.name)}</div>
          <div class="meta"><span class="cat" style="color:${CATS[r.cat].hex}">${CATS[r.cat].label}</span><span>·</span><span>${fmtDist(r.dist)}</span></div>
          ${ex}
        </div></div>`;
    }).join('');
    el.querySelectorAll('.entry').forEach(e=>e.onclick=()=>focusSite(e.dataset.id));
  }

  // markers
  layer.clearLayers(); state.markers={};
  shown.forEach(r=>{
    const icon = L.divIcon({className:'',html:`<div class="pin" style="color:${CATS[r.cat].hex}">${sigSvg(r.cat,17)}</div>`,iconSize:[30,30],iconAnchor:[15,15]});
    const m = L.marker([r.lat,r.lon],{icon}).addTo(layer);
    m.bindPopup(popupHtml(r),{maxWidth:280});
    state.markers[r.id]=m;
  });
}

function popupHtml(r){
  const img = r.thumb ? `<img src="${r.thumb}" alt="">` : '';
  const ex = r.extract ? `<div class="pex">${esc(r.extract)}</div>` : '';
  const link = r.src==='wiki' ? 'Read on Wikipedia →' : 'View on OpenStreetMap →';
  return `<div class="pop">${img}<div class="pnm">${esc(r.name)}</div>
    <div class="pmeta">${CATS[r.cat].label} · ${fmtDist(r.dist)} away</div>
    ${ex}<a href="${r.url}" target="_blank" rel="noopener">${link}</a></div>`;
}
function focusSite(id){
  const r = state.results.find(x=>x.id===id); if(!r) return;
  map.flyTo([r.lat,r.lon], Math.max(map.getZoom(),15),{duration:.8});
  const m = state.markers[id]; if(m) setTimeout(()=>m.openPopup(),420);
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ------------------------------------------------------------------ */
/*  CONTROLS                                                           */
/* ------------------------------------------------------------------ */
let located = false;
function locate(){
  if(!navigator.geolocation){ locateFail('This device has no location service.'); return; }
  document.getElementById('readout').innerHTML='<b>finding you…</b>';
  document.getElementById('entries').innerHTML='<div class="status"><div class="spin"></div>Asking your device where you are…</div>';
  navigator.geolocation.getCurrentPosition(
    p=>{ located=true; survey(p.coords.latitude,p.coords.longitude,+document.getElementById('radius').value,'Your location'); },
    err=>locateFail(err.code===1 ? 'Location permission was denied.' : 'Could not get a location fix.'),
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
}
function locateFail(msg){
  document.getElementById('readout').textContent='location unavailable';
  document.getElementById('entries').innerHTML=
    '<div class="status">'+msg+'<br><br>This app works from where you physically are. '+
    'Allow location access in your browser, then tap <b>Use my location</b>.<br><br>'+
    '<span style="font-size:11px;color:var(--bone-faint)">If you opened this inside another app or preview, location may be blocked there — open the file directly in a browser, or deploy it, and it will work.</span></div>';
}
document.getElementById('locate').onclick = locate;
document.getElementById('radius').onchange = ()=>{
  if(located) survey(state.lat,state.lon,+document.getElementById('radius').value);
};

/* location-only: try to find the user as soon as the app loads */
locate();
</script>
</body>
